name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '0 */4 * * *'   # runs every 4 hours
  workflow_dispatch:          # allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          echo "Pinging scootclear.streamlit.app..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://scootclear.streamlit.app/)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 303 ]; then
            echo "App is alive and responding!"
          else
            echo "Unexpected status code: $STATUS"
            exit 1
          fi
          echo "Done!"